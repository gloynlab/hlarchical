models:
  mlp:
    class: HierarchicalHLA
    params:
      backbone: mlp
      input_channels: 2
      hidden_dims: [128, 64, 32]
      dropout: 0.3
      learning_rate: 5e-4
      weight_decay: 0.01
      early_stopping: false
      moe: true
      ground_truth_gated_loss: false
      gated_loss_lambda: 0.5
  mlp-11:
    class: HierarchicalHLA
    params:
      backbone: mlp
      input_channels: 2
      hidden_dims: [128, 64, 32]
      dropout: 0.3
